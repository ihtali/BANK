# ============================================
# MAIN SECUREBANK SERVER
# ============================================
server {
    listen 80;
    server_name uia037.dev.openconsultinguk.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name uia037.dev.openconsultinguk.com;

    # ================= SSL ===================
    ssl_certificate /etc/letsencrypt/live/uia037.dev.openconsultinguk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uia037.dev.openconsultinguk.com/privkey.pem;

    # ================= HEADERS ===============
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ============================================
    # 1. BACKEND API (FastAPI)
    # ============================================
    location /api/ {
        proxy_pass http://fact-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================
    # 2. CHATBOT LOGIC (Your Python Server)
    # Use /chat-bot-api/ in ChatBot.tsx to hit this
    # ============================================
    location /chat-bot-api/ {
        proxy_pass http://chatbot:5000/;
        proxy_set_header Host $host;
    }

    # ============================================
    # 3. ADK WORKBENCH UI & ASSETS (The Dev Tool)
    # We move these into specific blocks to avoid 404s
    # ============================================
    
    # Dev-UI specific paths
    location /dev-ui/ {
        proxy_pass http://chatbot:5000/dev-ui/;
        proxy_set_header Host $host;
    }

    # Internal ADK Developer routes (Keep these strictly for the Workbench)
    location ~ ^/(list-apps|run_async|run_sse|list-sessions|get-session|list-agents|get-agent|builder/|debug/|runtime-config\.json) {
        proxy_pass http://chatbot:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_set_header Host $host;
    }

    # ============================================
    # 4. FRONTEND REACT (Main Wallet UI)
    # ============================================
    
    # We explicitly handle React assets here so they don't go to the chatbot
    location /assets/ {
        proxy_pass http://wallet-frontend:80/assets/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://wallet-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Handle React Router refreshes
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
    
    # ============================================
    # 5. MCP GATEWAY (The "Boss" Secure Bridge)
    # Accessible via /mcp-gateway/
    # ============================================
    location /mcp-gateway/ {
        proxy_pass http://mcp-gateway:5001/;
        proxy_http_version 1.1;
        
        # Essential for SSE (Server-Sent Events)
        proxy_set_header Connection "";
        proxy_set_header Cache-Control "no-cache";
        proxy_buffering off;
        proxy_read_timeout 86400s; # Keeps the bridge open for long periods
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
